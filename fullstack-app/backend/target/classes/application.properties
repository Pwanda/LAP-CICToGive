# Server configuration
server.port=8080

# PostgreSQL Database configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/cicdb
spring.datasource.username=cicuser
spring.datasource.password=cicpass
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Enable H2 console (deaktiviert für PostgreSQL)
spring.h2.console.enabled=false
# spring.h2.console.path=/h2-console

# JPA/Hibernate configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Initialize database with sample data
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

# JWT Configuration
app.jwt.secret=9a4f2c8d3b7a1e6f5d4c2b8a6e3f7d1c9a4f2c8d3b7a1e6f5d4c2b8a6e3f7d1c
app.jwt.expiration=86400000

# Jackson Configuration
spring.jackson.serialization.FAIL_ON_EMPTY_BEANS=false

# File upload configuration
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
